<!-- ── Top Contact Bar ─────────────────────────────────────────────── -->
<div class="top-bar">
  <div class="top-bar-inner">
    <div class="top-bar-cta">
      <ng-container *ngFor="let contact of contactItems; let isLast = last">
        <a *ngIf="contact.href; else textContact" class="cta-item" [href]="contact.href">
          <i [class]="contact.icon"></i>
          <span>{{ contact.value }}</span>
        </a>
        <ng-template #textContact>
          <span class="cta-item">
            <i [class]="contact.icon"></i>
            <span>{{ contact.value }}</span>
          </span>
        </ng-template>
        <span class="cta-divider" *ngIf="!isLast"></span>
      </ng-container>
    </div>
  </div>
</div>

<header class="app-header" [class.scrolled]="isScrolled">
  <div class="header-content">

    <!-- ── Logo Section ─────────────────────────────────────────────── -->
    <div class="header-left">
      <img loading="eager" fetchpriority="high" decoding="async" class="logo" src="../../../assets/assets/logo.png" alt="Logo" routerLink="/" />
      <a class="gw-logo logo-dark" routerLink="/">
        <div class="gw-words">
          <div class="gw-top">
            <span class="gw-go">go</span>
            <span class="gw-wild">WILD</span>
          </div>
          <span class="gw-sub">ಕರುನಾಡು</span>
        </div>
      </a>
    </div>

    <!-- ── Desktop Nav Links ─────────────────────────────────────────── -->
    <nav class="desktop-nav">
      <a
        class="nav-link"
        *ngFor="let link of navLinks"
        [routerLink]="link.route"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: !!link.exact }">
        <i [class]="link.icon"></i> {{ link.label }}
      </a>
    </nav>

    <!-- ── Right Section ─────────────────────────────────────────────── -->
<div class="header-right">

  <!-- 🔐 Show Login (only if NOT logged in) -->
  <button 
    class="login-btn"
    *ngIf="!isLoggedIn"
    (click)="openLoginPanel()">
    <i class="bi bi-person-fill"></i>
    <span>Login</span>
  </button>

  <!-- 👤 Desktop User Dropdown (only desktop + logged in) -->
  <div class="user-menu desktop-only" *ngIf="isLoggedIn">
    <button
      class="user-avatar-btn"
      [class.show]="isUserDropdownOpen"
      (click)="toggleUserDropdown()"
      aria-haspopup="true"
      [attr.aria-expanded]="isUserDropdownOpen">
      
      <div class="user-avatar" *ngIf="!profilePicture">
        {{ getUserInitials() }}
      </div>

      <img loading="lazy" decoding="async" *ngIf="profilePicture" 
           [src]="profilePicture" 
           alt="Profile" 
           class="user-avatar-img"/>

      <span class="user-name">{{ userName }}</span>
      <i class="bi bi-chevron-down"></i>
    </button>

    <div class="user-dropdown"
         [class.show]="isUserDropdownOpen"
         (clickOutside)="closeUserDropdown()">
         
      <a class="dropdown-item" (click)="navigateTo('/my-bookings')">
        <i class="bi bi-calendar-check"></i> My Bookings
      </a>

      <a class="dropdown-item text-danger" (click)="logout()">
        <i class="bi bi-box-arrow-right"></i> Logout
      </a>
    </div>
  </div>

  <!-- 📱 Mobile Hamburger -->
  <button 
    class="mobile-menu-btn mobile-only"
    (click)="isMobileMenuOpen = true"
    aria-label="Open menu">
    <i class="bi bi-list"></i>
  </button>

</div>

  </div>

  <!-- ── Mobile Drawer ─────────────────────────────────────────────── -->
  <div class="mobile-overlay" [class.show]="isMobileMenuOpen" (click)="closeMobileMenu()"></div>

  <nav class="mobile-nav" [class.show]="isMobileMenuOpen">
    <div class="mobile-nav-content">

      <!-- Close btn -->
      <button class="mobile-close-btn" (click)="closeMobileMenu()">
        <i class="bi bi-x-lg"></i>
      </button>

      <!-- Nav links -->
      <div class="mobile-nav-links">
        <a
          class="mobile-nav-link"
          *ngFor="let link of navLinks"
          [routerLink]="link.route"
          routerLinkActive="active"
          [routerLinkActiveOptions]="{ exact: !!link.exact }"
          (click)="closeMobileMenu()">
          <i [class]="link.icon"></i> {{ link.label }}
        </a>
      </div>

      <!-- Logged-in user -->
      <div class="mobile-user-section" *ngIf="isLoggedIn">
        <div class="mobile-user-avatar" *ngIf="!profilePicture">{{ getUserInitials() }}</div>
        <img loading="lazy" decoding="async" *ngIf="profilePicture" [src]="profilePicture" alt="Profile" class="mobile-user-avatar-img"/>
        <div class="mobile-user-info">
          <div class="mobile-user-name">{{ userName }}</div>
          <div class="mobile-user-email">{{ userEmail }}</div>
        </div>
      </div>

      <div class="mobile-user-actions" *ngIf="isLoggedIn">
        <a class="mobile-nav-link" (click)="navigateTo('/my-bookings'); closeMobileMenu()">
          <i class="bi bi-calendar-check"></i> My Bookings
        </a>
        <a class="mobile-nav-link text-danger" (click)="logout(); closeMobileMenu()">
          <i class="bi bi-box-arrow-right"></i> Logout
        </a>
      </div>

      <div class="mobile-login-section" *ngIf="!isLoggedIn">
        <button class="mobile-login-btn" (click)="openLoginPanel(); closeMobileMenu()">
          <i class="bi bi-person-fill"></i> Login to Your Account
        </button>
      </div>

      <!-- Mobile contact info -->
      <div class="mobile-contact-strip">
        <ng-container *ngFor="let contact of contactItems">
          <a *ngIf="contact.href; else mobileTextContact" class="mob-cta" [href]="contact.href">
            <i [class]="contact.icon"></i>
            <span>{{ contact.value }}</span>
          </a>
          <ng-template #mobileTextContact>
            <span class="mob-cta">
              <i [class]="contact.icon"></i>
              <span>{{ contact.value }}</span>
            </span>
          </ng-template>
        </ng-container>
      </div>

    </div>
  </nav>
</header>
